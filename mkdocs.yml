site_name: Basis Data & Networking Docs
site_description: Kumpulan materi basis data, networking, dan write-up lab.
site_url: https://cakgup.github.io/catatan/
repo_url: https://github.com/cakgup/catatan
repo_name: cakgup/catatan
docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: id
  palette:
    - scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Ganti ke mode gelap
    - scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Ganti ke mode terang
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.instant
    - navigation.path
    - navigation.top
    - toc.follow
    - search.highlight
    - search.suggest
    - header.autohide
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Beranda: index.md
  - Networking:
      - Overview: Networking/HPE_Aruba_Campus_Access/README.md
      - AOS-CX Labs:
          - Mulai di Sini: Networking/AOS-CX_Lab_Guides/README.md
          - Fondasi Layer 2:
              - Spanning Tree Basics: Networking/AOS-CX_Lab_Guides/AOS-CX Simulator Lab - Spanning Tree Basics Lab Guide.md
              - Local MAC Authentication: Networking/AOS-CX_Lab_Guides/AOS-CX Simulator - Local Mac Authentication Lab Guide.md
              - VSX Part 1: Networking/AOS-CX_Lab_Guides/AOS-CX Simulator - VSX Part 1 Lab Guide.md
              - Campus 2-Tier L2 Access VSX: Networking/AOS-CX_Lab_Guides/AOS-CX Simulator Lab - Campus 2-Tier IPv4 L2 Access VSX Lab Guide.md
          - Routing & Campus:
              - Deploying OSPF: Networking/AOS-CX_Lab_Guides/AOS-CX Simulator - Deploying OSPF Lab Guide.md
              - Campus 2-Tier L3 Access OSPF: Networking/AOS-CX_Lab_Guides/AOS-CX Simulator Lab - Campus 2-Tier L3 Access with OSPF Lab Guide.md
              - OSPFv2 Areas Basics: Networking/AOS-CX_Lab_Guides/AOS-CX Switch Simulator - OSPFv2 Areas Basics Lab Guide.md
              - Campus 3-Tier L2 Access VSX OSPF: Networking/AOS-CX_Lab_Guides/AOS-CX Simulator Lab - Campus 3-Tier IPv4 L2 Access with VSX and OSPF Lab Guide.md
          - Overlay & Data Center:
