          - Management PDB: Pelatihan Pengelolaan Basis Data Enterprise, 6 - 10 Juli 2026/File MD Pelatihan DBA 19c/manajement_pdb.md
          - Management Performance: Pelatihan Pengelolaan Basis Data Enterprise, 6 - 10 Juli 2026/File MD Pelatihan DBA 19c/manajement_performance.md
